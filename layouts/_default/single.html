{{ define "main" }}
<article class="container">
  <header class="post-header reveal reveal-1">
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 02, 2006" }}</time>
      {{ with .ReadingTime }} · {{ . }} min read{{ end }}
    </div>
    <h1 class="post-title">{{ .Title }}</h1>
    {{ with .Params.summary }}
      <p class="post-summary">{{ . }}</p>
    {{ end }}
    {{ with .Params.tags }}
      <div class="post-tags">
        {{ range . }}
          <a href="{{ "/tags/" | relURL }}{{ . | urlize }}/">#{{ . }}</a>
        {{ end }}
      </div>
    {{ end }}
  </header>

  <div class="post-content reveal reveal-2">
    {{ .Content }}
  </div>
</article>
{{ end }}
